{% extends "base.html" %}
{% block title %}Kecamatan{% endblock %}
{% block content %}
<h4 class="fw-bold mb-1">Kecamatan</h4>
<div class="text-secondary mb-3" style="font-size:13px" id="txt-kecamatan-info">Memuat data...</div>

<div class="row g-3" id="container-kecamatan">
  <!-- Data akan dimuat di sini oleh JavaScript -->
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    fetch('/api/kecamatan-stats')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('container-kecamatan');
            const info = document.getElementById('txt-kecamatan-info');
            container.innerHTML = '';
            info.innerText = `${data.length} kecamatan tercakup`;

            data.forEach(r => {
                const htmlCard = `
                <div class="col-4">
                  <a href="/pelanggan?kecamatan=${encodeURIComponent(r.kecamatan)}" class="text-decoration-none text-dark">
                    <div class="stat-card">
                      <div class="fw-bold mb-2" style="font-size:14px">${r.kecamatan}</div>
                      <div class="d-flex justify-content-between" style="font-size:12px">
                        <span class="text-secondary">Pelanggan</span><span class="fw-bold">${r.jumlah_pelanggan}</span>
                      </div>
                      <div class="d-flex justify-content-between" style="font-size:12px">
                        <span class="text-secondary">Status SIB</span><span class="fw-bold">${r.jumlah_sib}</span>
                      </div>
                      <div class="d-flex justify-content-between" style="font-size:12px">
                        <span class="text-secondary">Status BK</span><span class="fw-bold">${r.jumlah_bk}</span>
                      </div>
                    </div>
                  </a>
                </div>`;
                container.insertAdjacentHTML('beforeend', htmlCard);
            });
        })
        .catch(err => {
            console.error("Gagal memuat data kecamatan:", err);
        });
});
</script>
{% endblock %}
