{% extends "base.html" %}
{% block title %}Edit Instalasi{% endblock %}
{% block content %}
<h4 class="fw-bold mb-3">Edit instalasi {{ instalasi.nomor_instalasi }} &mdash; {{ pelanggan.nama }}</h4>

<form method="post" class="bg-white p-3 rounded" style="max-width:640px">

  <!-- ================= SECTION DATA PELANGGAN ================= -->
  <div class="fw-bold mb-2 text-primary" style="font-size:14px">Data Pelanggan</div>
  <div class="mb-2">
    <label class="form-label" style="font-size:13px">Nama pelanggan</label>
    <input class="form-control" name="nama" value="{{ pelanggan.nama }}" required>
  </div>
  <div class="mb-2">
    <label class="form-label" style="font-size:13px">Alamat</label>
    <input class="form-control" name="alamat" value="{{ pelanggan.alamat or '' }}">
  </div>
  <div class="row mb-3">
    <div class="col-6">
      <label class="form-label" style="font-size:13px">Kelurahan</label>
      <input class="form-control" name="kelurahan" value="{{ pelanggan.kelurahan or '' }}">
    </div>
    <div class="col-6">
      <label class="form-label" style="font-size:13px">Kecamatan</label>
      <input class="form-control" name="kecamatan" list="kecamatan-list" value="{{ pelanggan.kecamatan }}" required>
      <datalist id="kecamatan-list">
        {% for k in semua_kecamatan %}<option value="{{ k }}">{% endfor %}
      </datalist>
    </div>
  </div>

  <hr>

  <!-- ================= SECTION DATA INSTALASI ================= -->
  <div class="fw-bold mb-2 text-primary" style="font-size:14px">Data Instalasi</div>
  <div class="row mb-2">
    <div class="col-6">
      <label class="form-label" style="font-size:13px">Nomor instalasi</label>
      <input class="form-control" name="nomor_instalasi" value="{{ instalasi.nomor_instalasi }}" required>
    </div>
    <div class="col-6">
      <label class="form-label" style="font-size:13px">Tanggal pasang</label>
      <input type="date" class="form-control" name="tanggal_pasang" value="{{ instalasi.tanggal_pasang }}" required>
    </div>
  </div>

  <div class="row mb-2">
    <div class="col-4">
      <label class="form-label" style="font-size:13px">Diameter pipa</label>
      <input class="form-control" name="diameter_pipa" value="{{ instalasi.diameter_pipa or '' }}">
    </div>
    <div class="col-4">
      <label class="form-label" style="font-size:13px">Tekanan air</label>
      <input class="form-control" name="tekanan_air" value="{{ instalasi.tekanan_air or '' }}">
    </div>
    <div class="col-4">
      <label class="form-label" style="font-size:13px">Status</label>
      <select class="form-select" name="status" required>
        <option value="SIB" {{ 'selected' if instalasi.status=='SIB' }}>SIB</option>
        <option value="BK" {{ 'selected' if instalasi.status=='BK' }}>BK</option>
      </select>
    </div>
  </div>

  <div class="mb-2">
    <label class="form-label" style="font-size:13px">Petugas (boleh kosong)</label>
    <input class="form-control" name="petugas" value="{{ instalasi.petugas or '' }}">
  </div>

  <div class="mb-3">
    <label class="form-label" style="font-size:13px">Keterangan</label>
    <input class="form-control" name="keterangan" value="{{ instalasi.keterangan or '' }}">
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">Simpan perubahan</button>
    <!-- Tombol Batal Mengarah Kembali ke Semua Pelanggan -->
    <a href="{{ url_for('pelanggan_list') }}" class="btn btn-outline-secondary">Batal</a>
  </div>
</form>

<form method="post" action="{{ url_for('instalasi_hapus', iid=instalasi.id) }}" class="mt-3" onsubmit="return confirm('Hapus instalasi ini?')">
  <button type="submit" class="btn btn-sm btn-outline-danger">Hapus instalasi ini</button>
</form>
{% endblock %}
